<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>비교해보기(React)</title>
    </head>
    <body>
        <div id="root"></div>
        <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/prop-types@15.7.2/prop-types.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script type="text/babel">
            const root = document.querySelector("#root");

            function Btn(props) {
                console.log(props.children + " was reloaded");
                return (
                    <button onClick={props.onClick}>{props.children}</button>
                );
            }

            Btn.propTypes = {
                children: PropTypes.optionalNode,
                onClick: PropTypes.optionalFunction
            };

            const MemorizedBtn = React.memo(Btn);
            function App() {
                const [text, setText] = React.useState("Change");
                
                const handleChangeButtonClick = () => {
                    setText("Changed!");
                };

                return (
                    <>
                        <MemorizedBtn onClick={handleChangeButtonClick}>
                            {text}
                        </MemorizedBtn>
                        <MemorizedBtn>
                            Check
                        </MemorizedBtn>
                    </>
                );
            }

            ReactDOM.render(<App />, root);
        </script>
    </body>
</html>
